<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Blockly Sample App</title>
    <style>
      html, body { height: 100%; margin: 0; }
      body { display: flex; flex-direction: column; font-family: system-ui, sans-serif; }
      #pageContainer { display: flex; flex: 1; min-height: 0; }

      #outputPane {
        width: 36ch;
        min-width: 320px;
        background: #fff7e6;
        border-right: 1px solid #e8dfc8;
        padding: 10px;
        box-sizing: border-box;
        display: grid;
        grid-template-rows: auto 1fr auto auto; /* Run button, code, turtle, console */
        gap: 8px;
      }

      #runRow {
        display: flex; gap: 8px; align-items: center;
      }
      #runBtn {
        padding: 6px 12px; border-radius: 6px; border: 1px solid #bfb48a;
        background:#f3e7b3; cursor:pointer; font-weight:600;
      }
      #runBtn:active { transform: translateY(1px); }

      #generatedCode {
        background: #f8f1d0;
        border: 1px solid #efe5b7;
        border-radius: 6px;
        padding: 8px;
        margin: 0;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 13px;
        line-height: 1.35;
        max-height: 32vh;
        overflow: auto;
        white-space: pre-wrap;
      }

      /* Turtle canvas */
      #turtlePane {
        background: #ffffff;
        border: 1px solid #e7e2d3;
        border-radius: 6px;
        min-height: 220px;
        overflow: hidden;
        display: flex;
        align-items: stretch;
        justify-content: center;
      }
      #turtleCanvas { width: 100%; }

      /* Console */
      #console {
        background: #121212;
        color: #e7e7e7;
        border-radius: 6px;
        padding: 8px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 13px;
        max-height: 26vh;
        min-height: 64px;
        overflow: auto;
        border: 1px solid #1f1f1f;
      }
      
      #blocklyDiv { flex: 1; min-width: 0; }
    </style>
  </head>

  <body>
    <div id="pageContainer">
      <div id="outputPane">
        <div id="runRow">
          <button id="runBtn">Run</button>
        </div>

        <!-- generatedCode -->
        <pre id="generatedCode"><code></code></pre>

        <!-- turtle canvas below generatedCode -->
        <div id="turtlePane"><div id="turtleCanvas"></div></div>

        <!-- console -->
        <div id="console"></div>
      </div>

      <!-- workspace -->
      <div id="blocklyDiv"></div>
    </div>

    <!-- Skulpt -->
    <script src="https://cdn.jsdelivr.net/npm/skulpt@1.3.0/dist/skulpt.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/skulpt@1.3.0/dist/skulpt-stdlib.js"></script>
  </body>
</html>
