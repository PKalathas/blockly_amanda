<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Blockly</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }
      body {
        display: flex;
        flex-direction: column;
        font-family: system-ui, sans-serif;
      }
      #pageContainer {
        display: flex;
        flex: 1;
        min-height: 0;
      }

      #outputPane {
        width: 36ch;
        min-width: 320px;
        background: #fff7e6;
        border-right: 1px solid #e8dfc8;
        padding: 10px;
        box-sizing: border-box;
        display: grid;
        grid-template-rows: auto 1fr auto auto; /* run row, code, turtle, console */
        gap: 8px;
        position: relative;
        z-index: 2;
      }

      #runRow {
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
      }
      #runBtn {
        padding: 6px 12px;
        border-radius: 6px;
        border: 1px solid #bfb48a;
        background: #f3e7b3;
        cursor: pointer;
        font-weight: 600;
      }
      #runBtn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
      #runBtn:active {
        transform: translateY(1px);
      }

      #clearBtn {
        padding: 6px 12px;
        border-radius: 6px;
        border: 1px solid #d1d5db;
        background: #fff;
        cursor: pointer;
      }

      #clearTurtleBtn {
        padding: 6px 12px;
        border-radius: 6px;
        border: 1px solid #d1d5db;
        background: #fff;
        cursor: pointer;
      }

      #generatedCode {
        background: #f8f1d0;
        border: 1px solid #efe5b7;
        border-radius: 6px;
        padding: 8px;
        margin: 0;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 13px;
        line-height: 1.35;
        max-height: 32vh;
        height: 32vh;
        overflow: auto;
        white-space: pre;
        resize: vertical;
        box-sizing: border-box;
        width: 100%;
      }

      #turtlePane {
        position: relative;
        background: #ffffff;
        border: 1px solid #e7e2d3;
        border-radius: 6px;
        min-height: 160px;
        overflow: hidden;
      }

      #turtleCanvas {
        width: 100%;
        display: block;
        background: white;
      }

      #turtleOverlay {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }

      #console {
        background: #121212;
        color: #e7e7e7;
        border-radius: 6px;
        padding: 8px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 13px;
        max-height: 26vh;
        min-height: 64px;
        overflow: auto;
        border: 1px solid #1f1f1f;
        white-space: pre-wrap;
      }

      #blocklyDiv {
        flex: 1;
        min-width: 0;
        position: relative;
        z-index: 1;
      }
      #status {
        font-size: 12px;
        color: #6b7280;
      }
    </style>
  </head>

  <body>
    <div id="pageContainer">
      <div id="outputPane">
        <div id="runRow">
          <button id="runBtn">Loading Python…</button>
          <button id="clearBtn">Clear Console</button>
          <button id="clearTurtleBtn">Clear Turtle</button>
          <span id="status"></span>
        </div>

        <textarea id="generatedCode" spellcheck="false"></textarea>

        <div id="turtlePane">
          <canvas id="turtleCanvas" width="500" height="300"></canvas>
          <canvas id="turtleOverlay" width="500" height="300"></canvas>
        </div>

        <div id="console" aria-live="polite"></div>
      </div>

      <div id="blocklyDiv"></div>
    </div>

    <!-- Pyodide -->
    <script src="https://cdn.jsdelivr.net/pyodide/v0.26.2/full/pyodide.js"></script>
  </body>
</html>
